<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
<rect width="800" height="500" rx="12" fill="#1C1C1A"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="25" y="20" width="360" height="460" rx="12" fill="#042C53" stroke="#85B7EB" stroke-width="0.5"/>
<text x="205" y="46" text-anchor="middle" font-size="13" font-weight="500" fill="#E6F1FB">Three-layer context defense</text>
<text x="205" y="64" text-anchor="middle" font-size="10" fill="#85B7EB">Runs mid-turn after every LLM response</text>
<rect x="45" y="82" width="320" height="110" rx="8" fill="#27500A" stroke="#97C459" stroke-width="0.5"/>
<text x="205" y="104" text-anchor="middle" font-size="12" font-weight="500" fill="#EAF3DE">Layer 1: Prune</text>
<text x="205" y="122" text-anchor="middle" font-size="10" fill="#C0DD97">Triggers at 70% of history budget</text>
<text x="205" y="138" text-anchor="middle" font-size="10" fill="#97C459">No LLM call — mechanical text surgery</text>
<text x="205" y="154" text-anchor="middle" font-size="10" fill="#97C459">Soft: head+tail of large tool results</text>
<text x="205" y="170" text-anchor="middle" font-size="10" fill="#97C459">Hard: replace old results entirely</text>
<text x="205" y="180" text-anchor="middle" font-size="10" fill="#97C459">Protects last 3 assistant messages</text>
<line x1="205" y1="192" x2="205" y2="210" stroke="#888780" stroke-width="0.8" marker-end="url(#a)"/>
<text x="265" y="206" font-size="9" fill="#888780">still over budget?</text>
<rect x="45" y="212" width="320" height="100" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text x="205" y="234" text-anchor="middle" font-size="12" font-weight="500" fill="#FAEEDA">Layer 2: Compact</text>
<text x="205" y="252" text-anchor="middle" font-size="10" fill="#FAC775">Triggers at 100% of history budget</text>
<text x="205" y="268" text-anchor="middle" font-size="10" fill="#EF9F27">LLM call — summarize oldest 70%</text>
<text x="205" y="284" text-anchor="middle" font-size="10" fill="#EF9F27">Keep newest 30% intact</text>
<text x="205" y="300" text-anchor="middle" font-size="10" fill="#EF9F27">Never split tool_use / tool_result</text>
<line x1="205" y1="312" x2="205" y2="330" stroke="#888780" stroke-width="0.8" marker-end="url(#a)"/>
<text x="268" y="326" font-size="9" fill="#888780">after loop exits</text>
<rect x="45" y="332" width="320" height="110" rx="8" fill="#791F1F" stroke="#F09595" stroke-width="0.5"/>
<text x="205" y="354" text-anchor="middle" font-size="12" font-weight="500" fill="#FCEBEB">Layer 3: Background compact</text>
<text x="205" y="372" text-anchor="middle" font-size="10" fill="#F7C1C1">Triggers at 85% of context window</text>
<text x="205" y="388" text-anchor="middle" font-size="10" fill="#F09595">Async goroutine + per-session TryLock</text>
<text x="205" y="404" text-anchor="middle" font-size="10" fill="#F09595">Flush memories BEFORE compacting</text>
<text x="205" y="420" text-anchor="middle" font-size="10" fill="#F09595">Prepares session for next visit</text>
<text x="205" y="436" text-anchor="middle" font-size="10" fill="#F09595">Non-blocking — concurrent runs skip</text>
<rect x="415" y="20" width="360" height="130" rx="12" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="595" y="46" text-anchor="middle" font-size="13" font-weight="500" fill="#EEEDFE">Overhead calibration</text>
<text x="595" y="66" text-anchor="middle" font-size="10" fill="#CECBF6">First LLM response provides usage.prompt_tokens</text>
<rect x="435" y="80" width="320" height="24" rx="4" fill="#26215C" stroke="#7F77DD" stroke-width="0.3"/>
<text x="595" y="97" text-anchor="middle" font-size="10" font-weight="500" fill="#CECBF6">overhead = prompt_tokens - history_estimate</text>
<rect x="435" y="110" width="320" height="24" rx="4" fill="#26215C" stroke="#7F77DD" stroke-width="0.3"/>
<text x="595" y="127" text-anchor="middle" font-size="10" font-weight="500" fill="#CECBF6">history_budget = window - overhead - reserve</text>
<line x1="415" y1="105" x2="393" y2="105" stroke="#AFA9EC" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#a)"/>
<text x="404" y="96" font-size="9" fill="#AFA9EC">drives</text>
<text x="404" y="116" font-size="9" fill="#AFA9EC">thresholds</text>
<rect x="415" y="170" width="360" height="200" rx="12" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text x="595" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#FAEEDA">Tool loop detection</text>
<text x="595" y="214" text-anchor="middle" font-size="10" fill="#FAC775">Tracks last 30 tool calls (hash args + result)</text>
<rect x="435" y="228" width="320" height="38" rx="6" fill="#412402" stroke="#BA7517" stroke-width="0.3"/>
<text x="595" y="245" text-anchor="middle" font-size="11" font-weight="500" fill="#FAEEDA">Strategy 1: Identical loop</text>
<text x="595" y="259" text-anchor="middle" font-size="10" fill="#FAC775">Same tool + args + result — warn @3, kill @5</text>
<rect x="435" y="274" width="320" height="38" rx="6" fill="#412402" stroke="#BA7517" stroke-width="0.3"/>
<text x="595" y="291" text-anchor="middle" font-size="11" font-weight="500" fill="#FAEEDA">Strategy 2: Same result loop</text>
<text x="595" y="305" text-anchor="middle" font-size="10" fill="#FAC775">Different args, identical output — warn @3, kill @5</text>
<rect x="435" y="320" width="320" height="38" rx="6" fill="#412402" stroke="#BA7517" stroke-width="0.3"/>
<text x="595" y="337" text-anchor="middle" font-size="11" font-weight="500" fill="#FAEEDA">Strategy 3: Read-only streak</text>
<text x="595" y="351" text-anchor="middle" font-size="10" fill="#FAC775">Exploration (lenient) vs stuck (strict)</text>
<rect x="415" y="390" width="360" height="86" rx="12" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="595" y="416" text-anchor="middle" font-size="13" font-weight="500" fill="#E1F5EE">Tool result management</text>
<text x="595" y="436" text-anchor="middle" font-size="10" fill="#9FE1CB">Results capped at 8KB (was 100KB)</text>
<text x="595" y="452" text-anchor="middle" font-size="10" fill="#9FE1CB">Full output offloaded to /workspace/</text>
<text x="595" y="468" text-anchor="middle" font-size="10" fill="#9FE1CB">Agent cooperates via system prompt convention</text>
</svg>
