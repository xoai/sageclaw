domain: sageclaw.io
listen: :8080
auth:
  mode: token            # auto-registers new tokens from SageClaw instances
limits:
  max_tunnels: 100       # max simultaneous tunnel connections
  max_concurrent_requests: 50  # per tunnel
  max_body_size: 10485760      # 10MB
db: /data/relay.db       # SQLite token store (persisted via Docker volume)
