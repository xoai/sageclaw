# /etc/nginx/sites-available/sageclaw-relay
#
# Wildcard reverse proxy for SageClaw relay server.
# Handles: *.sageclaw.io + relay.sageclaw.io
# TLS via Let's Encrypt wildcard cert (certbot DNS-01 challenge).

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name *.sageclaw.io relay.sageclaw.io;

    # Wildcard TLS cert (obtained via certbot DNS-01)
    ssl_certificate     /etc/letsencrypt/live/sageclaw.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sageclaw.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to sageclaw-relay container
    location / {
        proxy_pass http://127.0.0.1:8080;

        # WebSocket support (required for tunnel connections)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;    # 24h — tunnel connections are persistent
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Body size limit (match relay config)
        client_max_body_size 10m;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name *.sageclaw.io relay.sageclaw.io;
    return 301 https://$host$request_uri;
}
